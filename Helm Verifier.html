<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Helm Verifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

/* ╔══════════════════════════════════════════════════════════╗
   ║  DESIGN TOKENS — DARK (default)                          ║
   ╚══════════════════════════════════════════════════════════╝ */
:root {
  --bg:           #070809;
  --bg2:          #0c0e12;
  --surface:      #0f1117;
  --surface2:     #141720;
  --surface3:     #1a1e2a;
  --surface4:     #212637;
  --border:       #1c2030;
  --border2:      #262d42;
  --border3:      #313a54;

  --text:         #dde3f0;
  --text2:        #7e8ba8;
  --text3:        #414e6a;
  --text4:        #293044;

  --green:        #1de9a2;
  --green-dim:    rgba(29,233,162,.08);
  --green-glow:   rgba(29,233,162,.18);
  --yellow:       #f5c842;
  --yellow-dim:   rgba(245,200,66,.08);
  --red:          #f0545a;
  --red-dim:      rgba(240,84,90,.08);
  --blue:         #4b9eff;
  --blue-dim:     rgba(75,158,255,.08);
  --blue-glow:    rgba(75,158,255,.15);

  --accent:       #4f7cff;
  --accent2:      #7c52ff;
  --accent-glow:  rgba(79,124,255,.20);

  /* YAML token colors — dark */
  --yaml-key:     #6fa3ff;
  --yaml-string:  #9ec8ff;
  --yaml-number:  #f0a84a;
  --yaml-bool:    #2ed8a0;
  --yaml-comment: #3d4d6a;
  --yaml-helm:    #c98bff;

  --mono: 'JetBrains Mono', 'Fira Code', monospace;
  --sans: 'Geist', system-ui, sans-serif;

  --radius:    10px;
  --radius-sm: 6px;
  --radius-lg: 14px;

  --toolbar-h: 58px;
  --console-h: 172px;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
  --shadow:    0 4px 16px rgba(0,0,0,.5);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.6);

  --transition: .16s cubic-bezier(.4,0,.2,1);
}

/* ╔══════════════════════════════════════════════════════════╗
   ║  LIGHT THEME                                             ║
   ╚══════════════════════════════════════════════════════════╝ */
[data-theme="light"] {
  --bg:           #eef0f6;
  --bg2:          #e7eaf3;
  --surface:      #ffffff;
  --surface2:     #f4f5fa;
  --surface3:     #eceef6;
  --surface4:     #e3e6f0;
  --border:       #dde0ec;
  --border2:      #cbd0e2;
  --border3:      #b8bed4;

  --text:         #16192b;
  --text2:        #454e6e;
  --text3:        #8a93b0;
  --text4:        #c0c5d8;

  --green:        #00b87a;
  --green-dim:    rgba(0,184,122,.07);
  --green-glow:   rgba(0,184,122,.12);
  --yellow:       #b08000;
  --yellow-dim:   rgba(176,128,0,.07);
  --red:          #c93b40;
  --red-dim:      rgba(201,59,64,.07);
  --blue:         #2060d0;
  --blue-dim:     rgba(32,96,208,.07);
  --blue-glow:    rgba(32,96,208,.12);

  --accent:       #3658e0;
  --accent2:      #6035d0;
  --accent-glow:  rgba(54,88,224,.14);

  --yaml-key:     #1a45c8;
  --yaml-string:  #0d68a0;
  --yaml-number:  #9a4200;
  --yaml-bool:    #006e48;
  --yaml-comment: #8892b0;
  --yaml-helm:    #7020a8;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow:    0 4px 16px rgba(0,0,0,.10);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.14);
}

/* ╔══════════════════════════════════════════════════════════╗
   ║  RESET & BASE                                            ║
   ╚══════════════════════════════════════════════════════════╝ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ╔══════════════════════════════════════════════════════════╗
   ║  TOOLBAR                                                 ║
   ╚══════════════════════════════════════════════════════════╝ */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 200;
  height: var(--toolbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 6px;
  /* subtle bottom shadow to lift it */
  box-shadow: 0 1px 0 var(--border), var(--shadow-sm);
}

/* Brand */
.toolbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: 12px;
  flex-shrink: 0;
}
.brand-icon {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 2px 8px var(--accent-glow);
  flex-shrink: 0;
}
.brand-icon svg {
  width: 14px; height: 14px;
  fill: none;
  stroke: rgba(255,255,255,.95);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.brand-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.brand-version {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .04em;
  padding: 1px 5px;
  border-radius: 4px;
  background: var(--surface3);
  border: 1px solid var(--border2);
}

/* Divider */
.t-divider {
  width: 1px;
  height: 20px;
  background: var(--border2);
  margin: 0 4px;
  flex-shrink: 0;
}

/* Generic toolbar button */
.t-btn {
  height: 32px;
  padding: 0 13px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: -.01em;
  cursor: pointer;
  transition: background var(--transition), color var(--transition),
              border-color var(--transition), box-shadow var(--transition),
              transform var(--transition);
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  outline: none;
}
.t-btn:hover {
  background: var(--surface3);
  color: var(--text);
  border-color: var(--border3);
}
.t-btn:active { transform: scale(.97); }

/* Icon-only button */
.t-btn-icon {
  width: 32px;
  height: 32px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  transition: background var(--transition), color var(--transition),
              border-color var(--transition), transform var(--transition);
  flex-shrink: 0;
  outline: none;
}
.t-btn-icon:hover {
  background: var(--surface3);
  color: var(--text);
  border-color: var(--border3);
}
.t-btn-icon:active { transform: scale(.94); }
.t-btn-icon svg {
  width: 14px; height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Primary render button */
#renderBtn {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  border-color: transparent;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 0 0 0 var(--accent-glow);
  transition: opacity var(--transition), box-shadow var(--transition), transform var(--transition);
}
#renderBtn:hover {
  opacity: .92;
  box-shadow: 0 0 0 4px var(--accent-glow);
  color: #fff;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  border-color: transparent;
}
#renderBtn svg { stroke: rgba(255,255,255,.9); }

/* Verify button */
#verifyBtn { color: var(--blue); }
#verifyBtn:hover {
  background: var(--blue-dim);
  border-color: var(--blue);
  color: var(--blue);
  box-shadow: 0 0 0 3px var(--blue-glow);
}

/* Status badge */
.status-container { margin-left: auto; flex-shrink: 0; }
.status {
  height: 26px;
  padding: 0 11px;
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 1px solid transparent;
  transition: all var(--transition);
}
.status::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status.valid {
  color: var(--green);
  background: var(--green-dim);
  border-color: rgba(29,233,162,.2);
}
.status.valid::before {
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse-green 2.4s ease-in-out infinite;
}
.status.warning {
  color: var(--yellow);
  background: var(--yellow-dim);
  border-color: rgba(245,200,66,.2);
}
.status.warning::before { background: var(--yellow); }
.status.error {
  color: var(--red);
  background: var(--red-dim);
  border-color: rgba(240,84,90,.2);
}
.status.error::before { background: var(--red); }

@keyframes pulse-green {
  0%, 100% { box-shadow: 0 0 4px var(--green); opacity: 1; }
  50%       { box-shadow: 0 0 10px var(--green); opacity: .6; }
}

/* ╔══════════════════════════════════════════════════════════╗
   ║  APP SHELL                                               ║
   ╚══════════════════════════════════════════════════════════╝ */
.app {
  display: flex;
  flex-direction: column;
  height: calc(100vh - var(--toolbar-h));
}

/* Three-column editor grid */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  min-height: 0;
  overflow: hidden;
  /* Gap via pseudo-border approach for theme consistency */
  background: var(--border);
  gap: 1px;
}

/* ╔══════════════════════════════════════════════════════════╗
   ║  PANELS                                                  ║
   ╚══════════════════════════════════════════════════════════╝ */
.panel {
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.panel-header {
  height: 40px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 0 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  user-select: none;
}

.panel-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.panel:nth-child(1) .panel-dot { background: var(--accent);  box-shadow: 0 0 6px var(--accent-glow); }
.panel:nth-child(2) .panel-dot { background: var(--blue);    box-shadow: 0 0 6px var(--blue-glow); }
.panel:nth-child(3) .panel-dot { background: var(--green);   box-shadow: 0 0 6px var(--green-glow); }

.panel-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: .06em;
  text-transform: uppercase;
}

.panel-tag {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--surface4);
  color: var(--text3);
  border: 1px solid var(--border2);
  margin-left: auto;
  letter-spacing: .03em;
}

/* ╔══════════════════════════════════════════════════════════╗
   ║  EDITOR (textarea + highlight backdrop)                  ║
   ╚══════════════════════════════════════════════════════════╝ */
.editor-wrapper {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.editor {
  display: flex;
  height: 100%;
}

/* Line numbers column */
.line-numbers {
  width: 50px;
  min-width: 50px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  color: var(--text4);
  text-align: right;
  padding: 15px 10px 15px 0;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.65;
  overflow: hidden;
  user-select: none;
  cursor: default;
  letter-spacing: 0;
  transition: color var(--transition);
}

/* Code area: backdrop + textarea stacked */
.code-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* Syntax-highlighted backdrop */
.highlight-backdrop {
  position: absolute;
  inset: 0;
  padding: 15px 16px;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.65;
  overflow: hidden;
  white-space: pre-wrap;
  word-break: break-word;
  pointer-events: none;
  user-select: none;
  -webkit-user-select: none;
  background: transparent;
  color: var(--text);
  border: none;
  margin: 0;
  tab-size: 2;
  -moz-tab-size: 2;
  z-index: 0;
  /* No transform — scroll is synced via scrollTop/scrollLeft directly */
  box-sizing: border-box;
}
.highlight-backdrop::-webkit-scrollbar { display: none; }
.highlight-backdrop { scrollbar-width: none; }

/* The real textarea — sits on top, transparent */
textarea {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  color: rgba(0,0,0,0);
  caret-color: var(--accent);
  border: none;
  resize: none;
  outline: none;
  padding: 15px 16px;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.65;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-word;
  z-index: 1;
  tab-size: 2;
  -moz-tab-size: 2;
  user-select: text;
  -webkit-user-select: text;
  box-sizing: border-box;
  /* Prevent any browser-specific text adjustments */
  text-size-adjust: none;
  -webkit-text-size-adjust: none;
}
textarea::selection {
  background: rgba(79,124,255,.35);
  color: rgba(0,0,0,0);
}
textarea::-webkit-scrollbar { width: 6px; height: 6px; }
textarea::-webkit-scrollbar-track { background: transparent; }
textarea::-webkit-scrollbar-thumb {
  background: var(--border3);
  border-radius: 99px;
}
textarea::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* YAML token classes */
.yaml-key     { color: var(--yaml-key); }
.yaml-string  { color: var(--yaml-string); }
.yaml-number  { color: var(--yaml-number); }
.yaml-bool    { color: var(--yaml-bool); }
.yaml-comment { color: var(--yaml-comment); font-style: italic; }
.yaml-helm    { color: var(--yaml-helm); font-style: normal; }
.yaml-plain   { color: var(--text); }
.yaml-colon   { color: var(--text2); }

/* ╔══════════════════════════════════════════════════════════╗
   ║  OUTPUT PANEL                                            ║
   ╚══════════════════════════════════════════════════════════╝ */
.output {
  position: absolute;
  inset: 0;
  overflow: auto;
  padding: 15px 16px;
  font-family: var(--mono);
  font-size: 12.5px;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.65;
  color: var(--text2);
}
.output::-webkit-scrollbar { width: 6px; }
.output::-webkit-scrollbar-track { background: transparent; }
.output::-webkit-scrollbar-thumb {
  background: var(--border3);
  border-radius: 99px;
}
.output::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* Empty state for output */
.output:empty::before {
  content: '— run Render to see output —';
  display: block;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text4);
  letter-spacing: .04em;
  margin-top: 4px;
}

/* ╔══════════════════════════════════════════════════════════╗
   ║  CONSOLE                                                 ║
   ╚══════════════════════════════════════════════════════════╝ */
.console {
  height: var(--console-h);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.console-header {
  height: 34px;
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  user-select: none;
}

.console-led {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text4);
  flex-shrink: 0;
  transition: background var(--transition), box-shadow var(--transition);
}
.console-led.active {
  background: var(--green);
  box-shadow: 0 0 5px var(--green);
}

.console-title {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: .12em;
  text-transform: uppercase;
}

.console-count {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .06em;
}

.console-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 14px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.console-body::-webkit-scrollbar { width: 4px; }
.console-body::-webkit-scrollbar-thumb {
  background: var(--border2);
  border-radius: 99px;
}

/* Console messages */
.msg {
  font-family: var(--mono);
  font-size: 11.5px;
  padding: 5px 11px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: baseline;
  gap: 9px;
  line-height: 1.5;
  border: 1px solid transparent;
  transition: background var(--transition);
}
.msg-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  flex-shrink: 0;
  padding: 1px 5px;
  border-radius: 3px;
}

.success {
  background: var(--green-dim);
  color: var(--green);
  border-color: rgba(29,233,162,.12);
}
.success .msg-badge {
  background: rgba(29,233,162,.16);
  color: var(--green);
}
.warning {
  background: var(--yellow-dim);
  color: var(--yellow);
  border-color: rgba(245,200,66,.12);
}
.warning .msg-badge {
  background: rgba(245,200,66,.16);
  color: var(--yellow);
}
.error {
  background: var(--red-dim);
  color: var(--red);
  border-color: rgba(240,84,90,.12);
}
.error .msg-badge {
  background: rgba(240,84,90,.16);
  color: var(--red);
}

/* ╔══════════════════════════════════════════════════════════╗
   ║  TOAST                                                   ║
   ╚══════════════════════════════════════════════════════════╝ */
.toast {
  position: fixed;
  right: 18px;
  bottom: 22px;
  background: var(--surface3);
  color: var(--text);
  border: 1px solid var(--border2);
  padding: 9px 15px;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 11.5px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .22s ease, transform .22s ease;
  pointer-events: none;
  box-shadow: var(--shadow-lg);
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 8px;
  max-width: 280px;
}
.toast::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ╔══════════════════════════════════════════════════════════╗
   ║  RESPONSIVE                                              ║
   ╚══════════════════════════════════════════════════════════╝ */
@media (max-width: 1100px) {
  .main { grid-template-columns: 1fr 1fr; }
  .panel:last-child { grid-column: span 2; }
}

@media (max-width: 700px) {
  :root { --toolbar-h: 96px; --console-h: 140px; }
  .main { grid-template-columns: 1fr; }
  .panel:last-child { grid-column: auto; }
  .toolbar { flex-wrap: wrap; height: auto; padding: 10px 14px; gap: 6px; }
  .toolbar-brand { order: -1; width: 100%; }
  .t-divider { display: none; }
  .status-container { margin-left: auto; }
  .app { height: calc(100vh - var(--toolbar-h)); }
  .brand-version { display: none; }
}

/* ╔══════════════════════════════════════════════════════════╗
   ║  THEME TRANSITION                                        ║
   ╚══════════════════════════════════════════════════════════╝ */
html { transition: background var(--transition); }

</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     TOOLBAR
     ═══════════════════════════════════════════════════════════ -->
<div class="toolbar">

  <div class="toolbar-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 16 16">
        <polyline points="3,12 3,4 8,1 13,4 13,12"/>
        <line x1="3" y1="8" x2="13" y2="8"/>
        <line x1="6" y1="4" x2="6" y2="12"/>
        <line x1="10" y1="4" x2="10" y2="12"/>
      </svg>
    </div>
    <span class="brand-name">Helm Verifier</span>
    <span class="brand-version">v8</span>
  </div>

  <div class="t-divider"></div>

  <!-- Primary actions -->
  <button id="renderBtn" class="t-btn">

/* ══════════════════════════════════════════════════════════════════════════
   HTML ESCAPE
   ══════════════════════════════════════════════════════════════════════════ */
function escapeHtml(t) {
  return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ══════════════════════════════════════════════════════════════════════════
   YAML + HELM SYNTAX HIGHLIGHTER  (input backdrops)
   ══════════════════════════════════════════════════════════════════════════ */
function highlightInputLine(line) {
  if (/^\s*#/.test(line)) return `<span class="yaml-comment">${escapeHtml(line)}</span>`;
  const parts = [];
  const helmRe = /(\{\{[\s\S]*?\}\})/g;
  let last = 0, m;
  while ((m = helmRe.exec(line)) !== null) {
    if (m.index > last) parts.push({ type: 'yaml', text: line.slice(last, m.index) });
    parts.push({ type: 'helm', text: m[0] });
    last = m.index + m[0].length;
  }
  if (last < line.length) parts.push({ type: 'yaml', text: line.slice(last) });
  if (parts.length === 1 && parts[0].type === 'yaml') return highlightYamlSegmentFull(line);
  return parts.map(p =>
    p.type === 'helm'
      ? `<span class="yaml-helm">${escapeHtml(p.text)}</span>`
      : highlightYamlInline(p.text)
  ).join('');
}

function highlightYamlSegmentFull(line) {
  const esc = escapeHtml(line);
  if (/^\s*-\s/.test(line) && !line.includes(':')) return `<span class="yaml-string">${esc}</span>`;
  // Match key: value (value must start with space/tab; negative lookahead avoids URL false-positives)
  const keyVal = line.match(/^(\s*-?\s*)([^:#\s{}][^:{]*?)\s*:(?!\/\/)([ \t].*)$/);
  if (keyVal) {
    let v = escapeHtml(keyVal[3]);
    v = v.replace(/\b(true|false|null)\b/g, '<span class="yaml-bool">$1</span>');
    v = v.replace(/(?<![{A-Za-z])(-?\d+(\.\d+)?)(?![}\w])/g, '<span class="yaml-number">$1</span>');
    return `${escapeHtml(keyVal[1])}<span class="yaml-key">${escapeHtml(keyVal[2])}</span><span class="yaml-colon">:</span><span class="yaml-string">${v}</span>`;
  }
  const keyOnly = line.match(/^(\s*-?\s*)([^:#\s{}][^:{]*?)\s*:\s*$/);
  if (keyOnly) return `${escapeHtml(keyOnly[1])}<span class="yaml-key">${escapeHtml(keyOnly[2])}</span><span class="yaml-colon">:</span>`;
  return esc;
}

function highlightYamlInline(text) {
  const esc = escapeHtml(text);
  const kv = text.match(/^(\s*-?\s*)([^:#\s{}][^:{]*?)\s*:(?!\/\/)([ \t].*)?$/);
  if (kv) {
    const prefix = escapeHtml(kv[1]);
    const key    = escapeHtml(kv[2]);
    let val = kv[3] ? escapeHtml(kv[3]) : '';
    val = val.replace(/\b(true|false|null)\b/g, '<span class="yaml-bool">$1</span>');
    val = val.replace(/(?<![{A-Za-z])(-?\d+(\.\d+)?)(?![}\w])/g, '<span class="yaml-number">$1</span>');
    return `${prefix}<span class="yaml-key">${key}</span><span class="yaml-colon">:</span>${val ? `<span class="yaml-string">${val}</span>` : ''}`;
  }
  if (/^\s*(true|false|null)\s*$/.test(text)) return `<span class="yaml-bool">${esc}</span>`;
  if (/^\s*-?\d+(\.\d+)?\s*$/.test(text))    return `<span class="yaml-number">${esc}</span>`;
  return esc;
}

function highlightInputYAML(text) {
  return text.split('\n').map(highlightInputLine).join('\n');
}

/* ══════════════════════════════════════════════════════════════════════════
   LINE NUMBERS + BACKDROP SYNC
   ══════════════════════════════════════════════════════════════════════════ */
function updateLines(textarea, lineDiv) {
  const count = textarea.value.split('\n').length;
  lineDiv.innerHTML = Array.from({ length: count }, (_, i) => i + 1).join('<br>');
}
function syncScroll(textarea, lineDiv, backdrop) {
  lineDiv.scrollTop = textarea.scrollTop;
  // Sync backdrop scroll directly — identical to textarea scroll position.
  // This avoids the sub-pixel transform misalignment that caused cursor drift.
  backdrop.scrollTop  = textarea.scrollTop;
  backdrop.scrollLeft = textarea.scrollLeft;
}
function updateBackdrop(textarea, backdrop) {
  backdrop.innerHTML = highlightInputYAML(textarea.value);
}
function setupEditor(textarea, lineDiv, backdrop) {
  updateLines(textarea, lineDiv);
  updateBackdrop(textarea, backdrop);

  // Defer all visual updates via rAF so the browser completes its native
  // text-editing (caret placement, selection, deletion) BEFORE we mutate
  // the backdrop DOM. This prevents the backdrop innerHTML rewrite from
  // interfering with selection state and backspace/delete behaviour.
  let rafPending = false;
  function scheduleUpdate() {
    if (rafPending) return;
    rafPending = true;
    requestAnimationFrame(() => {
      rafPending = false;
      updateLines(textarea, lineDiv);
      updateBackdrop(textarea, backdrop);
      syncScroll(textarea, lineDiv, backdrop);
    });
  }

  textarea.addEventListener('input', scheduleUpdate);
  textarea.addEventListener('scroll', () => syncScroll(textarea, lineDiv, backdrop));

  // Re-sync scroll position after any keyboard navigation or mouse interaction
  // that may change scroll position without firing 'scroll' (e.g. arrow keys
  // scrolling the viewport when caret moves near edge).
  textarea.addEventListener('keyup', () => syncScroll(textarea, lineDiv, backdrop));
  textarea.addEventListener('mouseup', () => syncScroll(textarea, lineDiv, backdrop));
  textarea.addEventListener('click', () => syncScroll(textarea, lineDiv, backdrop));

  // Keep backdrop in sync when container resizes (window resize, panel resize)
  if (typeof ResizeObserver !== 'undefined') {
    const ro = new ResizeObserver(() => syncScroll(textarea, lineDiv, backdrop));
    ro.observe(textarea);
  }

  // Intercept paste — insert plain text at cursor ourselves so we control
  // the value synchronously, then schedule a visual refresh.
  textarea.addEventListener('paste', (e) => {
    e.preventDefault();
    const clip = (e.clipboardData || window.clipboardData).getData('text');
    if (!clip) return;
    const start = textarea.selectionStart;
    const end   = textarea.selectionEnd;
    textarea.value = textarea.value.substring(0, start) + clip + textarea.value.substring(end);
    textarea.selectionStart = textarea.selectionEnd = start + clip.length;
    scheduleUpdate();
  });

  // Drop — browser controls drop timing, always defer.
  textarea.addEventListener('drop', () => {
    requestAnimationFrame(() => {
      scheduleUpdate();
      textarea.focus();
    });
  });

  // Tab — insert two spaces; schedule visual update AFTER setting caret.
  textarea.addEventListener('keydown', (e) => {
    if (e.key !== 'Tab') return;
    e.preventDefault();
    const start = textarea.selectionStart;
    const end   = textarea.selectionEnd;
    textarea.value = textarea.value.substring(0, start) + '  ' + textarea.value.substring(end);
    textarea.selectionStart = textarea.selectionEnd = start + 2;
    scheduleUpdate();
  });
}
setupEditor(templateEditor, document.getElementById('templateLines'), templateBackdrop);
setupEditor(valuesEditor,   document.getElementById('valuesLines'),   valuesBackdrop);

/* ══════════════════════════════════════════════════════════════════════════
   YAML PARSER
   ══════════════════════════════════════════════════════════════════════════ */
function parseScalar(raw) {
  const s = raw.trim();
  if (s === 'true'  || s === 'yes') return true;
  if (s === 'false' || s === 'no' ) return false;
  if (s === 'null'  || s === '~'  ) return null;
  if (/^-?\d+$/.test(s))           return parseInt(s, 10);
  if (/^-?\d+\.\d+$/.test(s))      return parseFloat(s);
  if (/^"(.*)"$/.test(s))          return s.slice(1, -1);
  if (/^'(.*)'$/.test(s))          return s.slice(1, -1);
  return s;
}

function parseYAML(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\t/g, '  ').split('\n');
  const tokens = [];
  for (let i = 0; i < lines.length; i++) {
    const line     = lines[i];
    const stripped = line.trimEnd();
    if (!stripped.trim() || stripped.trim().startsWith('#')) continue;
    const indent  = stripped.match(/^( *)/)[1].length;
    const content = stripped.trim();
    if (content.startsWith('- ')) {
      tokens.push({ indent, type: 'sequence', rawValue: content.slice(2).trim(), lineIdx: i });
    } else if (content === '-') {
      tokens.push({ indent, type: 'sequence', rawValue: '', lineIdx: i });
    } else {
      const colon = content.indexOf(':');
      if (colon === -1) continue;
      tokens.push({ indent, type: 'mapping', key: content.slice(0, colon).trim(), rawValue: content.slice(colon + 1).trim(), lineIdx: i });
    }
  }
  let pos = 0;
  function parseValue(baseIndent) {
    if (pos >= tokens.length) return undefined;
    const next = tokens[pos];
    if (next.indent <= baseIndent) return undefined;
    return next.type === 'sequence' ? parseSequence(next.indent) : parseMapping(next.indent);
  }
  function parseMapping(atIndent) {
    const obj = {};
    while (pos < tokens.length) {
      const tok = tokens[pos];
      if (tok.indent < atIndent) break;
      if (tok.indent > atIndent) { pos++; continue; }
      if (tok.type === 'sequence') break;
      pos++;
      if (tok.rawValue === '') {
        const child = parseValue(tok.indent);
        obj[tok.key] = child !== undefined ? child : {};
      } else {
        obj[tok.key] = parseScalar(tok.rawValue);
      }
    }
    return obj;
  }
  function parseSequence(atIndent) {
    const arr = [];
    while (pos < tokens.length) {
      const tok = tokens[pos];
      if (tok.indent < atIndent) break;
      if (tok.indent > atIndent) { pos++; continue; }
      if (tok.type !== 'sequence') break;
      pos++;
      if (tok.rawValue === '') {
        const child = parseValue(tok.indent);
        arr.push(child !== undefined ? child : {});
      } else if (tok.rawValue.includes(':')) {
        const item = {};
        const ci   = tok.rawValue.indexOf(':');
        const k    = tok.rawValue.slice(0, ci).trim();
        const v    = tok.rawValue.slice(ci + 1).trim();
        item[k]    = parseScalar(v);
        while (pos < tokens.length && tokens[pos].indent > atIndent && tokens[pos].type === 'mapping') {
          const sub = tokens[pos++];
          item[sub.key] = sub.rawValue === '' ? (parseValue(sub.indent) || {}) : parseScalar(sub.rawValue);
        }
        arr.push(item);
      } else {
        arr.push(parseScalar(tok.rawValue));
      }
    }
    return arr;
  }
  if (tokens.length === 0) return {};
  return parseMapping(0);
}

/* ══════════════════════════════════════════════════════════════════════════
   PATH RESOLVER
   ══════════════════════════════════════════════════════════════════════════ */
function resolvePath(obj, dotPath) {
  const parts = dotPath.split('.');
  let cur = obj;
  for (const p of parts) {
    if (cur === null || cur === undefined || typeof cur !== 'object') return undefined;
    if (!Object.prototype.hasOwnProperty.call(cur, p)) return undefined;
    cur = cur[p];
  }
  return cur;
}

/* ══════════════════════════════════════════════════════════════════════════
   EXPRESSION EVALUATOR
   ctx = { vals, dot, vars }
   ══════════════════════════════════════════════════════════════════════════ */
const UNDEF = Symbol('undef');

function isTruthy(v) {
  if (v === UNDEF || v === undefined || v === null || v === false || v === '' || v === 0) return false;
  if (Array.isArray(v) && v.length === 0) return false;
  if (typeof v === 'object' && !Array.isArray(v) && Object.keys(v).length === 0) return false;
  return true;
}

const RELEASE_STUB = { Name:'release-name', Namespace:'default', Service:'Helm', Revision:1, IsInstall:true, IsUpgrade:false };
const CHART_STUB   = { Name:'chart', Version:'0.1.0', AppVersion:'1.0.0', Description:'A Helm chart' };

function toNum(v) { const n = Number(v); return isNaN(n) ? 0 : n; }

/* ── Argument tokeniser ──────────────────────────────────────────────────── */
function tokeniseArgs(str) {
  const args = [];
  let cur = '', depth = 0, inStr = false, strChar = '';
  for (let i = 0; i < str.length; i++) {
    const c = str[i];
    if (inStr) {
      cur += c;
      if (c === strChar && str[i - 1] !== '\\') inStr = false;
    } else if (c === '"' || c === "'") {
      inStr = true; strChar = c; cur += c;
    } else if (c === '(') {
      depth++; cur += c;
    } else if (c === ')') {
      depth--; cur += c;
    } else if (c === ' ' && depth === 0) {
      if (cur) { args.push(cur); cur = ''; }
    } else {
      cur += c;
    }
  }
  if (cur) args.push(cur);
  return args;
}

/* ── pipe splitter ───────────────────────────────────────────────────────── */
function splitPipes(expr) {
  const parts = [];
  let depth = 0, cur = '';
  for (let i = 0; i < expr.length; i++) {
    const c = expr[i];
    if      (c === '(')              { depth++; cur += c; }
    else if (c === ')')              { depth--; cur += c; }
    else if (c === '|' && depth===0) { parts.push(cur.trim()); cur = ''; }
    else                             { cur += c; }
  }
  parts.push(cur.trim());
  return parts;
}

/* ── JS→YAML serialiser ──────────────────────────────────────────────────── */
function jsToYaml(v, indent) {
  const pad = '  '.repeat(indent);
  if (v === null || v === undefined) return 'null';
  if (typeof v === 'boolean') return String(v);
  if (typeof v === 'number')  return String(v);
  if (typeof v === 'string') {
    if (/[:\{\}\[\],&*#\?|\-<>=!%@`]/.test(v) || v.includes('\n') || v.trim() !== v)
      return `"${v.replace(/\\/g,'\\\\').replace(/"/g,'\\"')}"`;
    return v;
  }
  if (Array.isArray(v)) {
    if (!v.length) return '[]';
    return v.map(item => `\n${pad}- ${jsToYaml(item, indent+1)}`).join('');
  }
  if (typeof v === 'object') {
    const keys = Object.keys(v);
    if (!keys.length) return '{}';
    return keys.map(k => `\n${pad}${k}: ${jsToYaml(v[k], indent+1)}`).join('');
  }
  return String(v);
}

/* ── Minimal Go sprintf ──────────────────────────────────────────────────── */
function goSprintf(fmt, args) {
  let i = 0;
  return fmt.replace(/%([+\-# 0]*)(\d*)(?:\.(\d+))?([vdsfxXoObteqp%])/g, (_, flags, width, prec, verb) => {
    if (verb === '%') return '%';
    const val = i < args.length ? args[i++] : '';
    const w   = width ? parseInt(width) : 0;
    let s;
    switch (verb) {
      case 'd': s = String(Math.trunc(Number(val))); break;
      case 'f': s = prec !== undefined ? Number(val).toFixed(parseInt(prec)) : Number(val).toString(); break;
      case 'e': s = Number(val).toExponential(prec !== undefined ? parseInt(prec) : 6); break;
      case 'x': s = Math.trunc(Number(val)).toString(16); break;
      case 'X': s = Math.trunc(Number(val)).toString(16).toUpperCase(); break;
      case 'o': s = Math.trunc(Number(val)).toString(8); break;
      case 'b': s = Math.trunc(Number(val)).toString(2); break;
      case 's': case 'v': s = val === null || val === undefined ? '' : String(val); break;
      case 'q': s = JSON.stringify(val === null ? '' : String(val)); break;
      default:  s = String(val);
    }

  }
  { const hsP = filter.match(/^hasSuffix\s+(.+)$/);
    if (hsP) return String(val).endsWith(String(evalStage(hsP[1],ctx)));
  }

  return val;
}

/* ── evalExprCtx ─────────────────────────────────────────────────────────── */
function evalExprCtx(raw, ctx) {
  const stages = splitPipes(raw.trim());
  let val = evalStage(stages[0], ctx);
  for (let i = 1; i < stages.length; i++) val = applyFilter(stages[i], val, ctx);
  return val;
}

/* ══════════════════════════════════════════════════════════════════════════
   TEMPLATE ENGINE  — tokenise → parse → execute
   ══════════════════════════════════════════════════════════════════════════ */
function tokeniseTemplate(src) {
  const tokens = [];
  const re = /(\{\{-?)([\s\S]*?)(-?\}\})/g;
  let last = 0, m;
  while ((m = re.exec(src)) !== null) {
    if (m.index > last) tokens.push({ type: 'text', value: src.slice(last, m.index) });
    tokens.push({ type: 'action', inner: m[2].trim(), trimLeft: m[1].endsWith('-'), trimRight: m[3].startsWith('-'), raw: m[0] });
    last = m.index + m[0].length;
  }
  if (last < src.length) tokens.push({ type: 'text', value: src.slice(last) });
  return tokens;
}

function parseNodes(tokens, pos) {
  const nodes = [];
  while (pos < tokens.length) {
    const tok = tokens[pos];

    if (tok.type === 'text') {
      nodes.push({ type: 'text', value: tok.value });
      pos++;
      continue;
    }

    const inner = tok.inner;
    if (/^end$/.test(inner) || /^else(\s|$)/.test(inner)) break;

    // Comment
    if (/^\/\*[\s\S]*\*\/$/.test(inner) || inner.startsWith('/*')) {
      nodes.push({ type: 'comment', trimLeft: tok.trimLeft, trimRight: tok.trimRight });
      pos++;
      continue;
    }

    // if
    if (/^if(\s|$)/.test(inner)) {
      const condExpr = inner.replace(/^if\s*/, '');
      pos++;
      const r1 = parseNodes(tokens, pos); pos = r1.pos;
      const elseChains = [];
      while (pos < tokens.length && tokens[pos].type === 'action' && /^else(\s|$)/.test(tokens[pos].inner)) {
        const elTok = tokens[pos];
        if (/^else\s+if\s/.test(elTok.inner)) {
          const ec = elTok.inner.replace(/^else\s+if\s*/, '');
          pos++;
          const r2 = parseNodes(tokens, pos); pos = r2.pos;
          elseChains.push({ type: 'elseif', cond: ec, nodes: r2.nodes });
        } else {
          pos++;
          const r3 = parseNodes(tokens, pos); pos = r3.pos;
          elseChains.push({ type: 'else', nodes: r3.nodes });
          break;
        }
      }
      if (pos < tokens.length && tokens[pos].type === 'action' && /^end$/.test(tokens[pos].inner)) pos++;
      nodes.push({ type: 'if', cond: condExpr, thenNodes: r1.nodes, elseChains, trimLeft: tok.trimLeft, trimRight: tok.trimRight });
      continue;
    }

    // range
    if (/^range(\s|$)/.test(inner)) {
      const rangeExpr = inner.replace(/^range\s*/, '');
      pos++;
      const rb = parseNodes(tokens, pos); pos = rb.pos;
      let elseNodes = null;
      if (pos < tokens.length && tokens[pos].type === 'action' && /^else$/.test(tokens[pos].inner)) {
        pos++;
        const re2 = parseNodes(tokens, pos); pos = re2.pos;
        elseNodes = re2.nodes;
      }
      if (pos < tokens.length && tokens[pos].type === 'action' && /^end$/.test(tokens[pos].inner)) pos++;
      nodes.push({ type: 'range', expr: rangeExpr, bodyNodes: rb.nodes, elseNodes, trimLeft: tok.trimLeft, trimRight: tok.trimRight });
      continue;
    }

    // with
    if (/^with\s/.test(inner)) {
      const withExpr = inner.replace(/^with\s*/, '');
      pos++;
      const wb = parseNodes(tokens, pos); pos = wb.pos;
      let elseNodes = null;
      if (pos < tokens.length && tokens[pos].type === 'action' && /^else$/.test(tokens[pos].inner)) {
        pos++;
        const we = parseNodes(tokens, pos); pos = we.pos;
        elseNodes = we.nodes;
      }
      if (pos < tokens.length && tokens[pos].type === 'action' && /^end$/.test(tokens[pos].inner)) pos++;
      nodes.push({ type: 'with', expr: withExpr, bodyNodes: wb.nodes, elseNodes, trimLeft: tok.trimLeft, trimRight: tok.trimRight });
      continue;
    }

    // define
    if (/^define\s/.test(inner)) {
      const nm = inner.match(/^define\s+["'](.+?)["']$/);
      const defName = nm ? nm[1] : inner.replace(/^define\s+/, '');
      pos++;
      const db = parseNodes(tokens, pos); pos = db.pos;
      if (pos < tokens.length && tokens[pos].type === 'action' && /^end$/.test(tokens[pos].inner)) pos++;
      nodes.push({ type: 'define', name: defName, defNodes: db.nodes });
      continue;
    }

    // variable assignment
    const assignM = inner.match(/^(\$[A-Za-z_][A-Za-z0-9_]*)\s*:=\s*(.+)$/);
    if (assignM) {
      nodes.push({ type: 'assign', varName: assignM[1].slice(1), expr: assignM[2].trim(), trimLeft: tok.trimLeft, trimRight: tok.trimRight });
      pos++;
      continue;
    }

    // plain expression
    nodes.push({ type: 'expr', expr: inner, trimLeft: tok.trimLeft, trimRight: tok.trimRight });
    pos++;
  }
  return { nodes, pos };
}

function execNodes(nodes, ctx) {
  let out = '';
  for (let i = 0; i < nodes.length; i++) {
    const node = nodes[i];
    const next = nodes[i + 1];
    let piece = '';

    switch (node.type) {
      case 'text': {
        piece = node.value;
        break;
      }
      case 'comment': piece = ''; break;
      case 'assign': {
        const v = evalExprCtx(node.expr, ctx);
        ctx.vars[node.varName] = v === UNDEF ? null : v;
        piece = '';
        break;
      }
      case 'expr': {
        const v = evalExprCtx(node.expr, ctx);
        piece = (v === UNDEF || v === null || v === undefined) ? '' : String(v);
        break;
      }
      case 'if': {
        if (isTruthy(evalExprCtx(node.cond, ctx))) {
          piece = execNodes(node.thenNodes, ctx);
        } else {
          let handled = false;
          for (const chain of node.elseChains) {
            if (chain.type === 'elseif') {
              if (isTruthy(evalExprCtx(chain.cond, ctx))) { piece = execNodes(chain.nodes, ctx); handled = true; break; }
            } else {
              piece = execNodes(chain.nodes, ctx); handled = true; break;
            }
          }
          if (!handled) piece = '';
        }
        break;
      }
      case 'range': {
        const rExpr = node.expr;
        let collection = null, keyVar = null, valVar = null;
        const kvM = rExpr.match(/^(\$[A-Za-z_][A-Za-z0-9_]*)\s*,\s*(\$[A-Za-z_][A-Za-z0-9_]*)\s*:=\s*(.+)$/);
        if (kvM) {
          keyVar = kvM[1].slice(1); valVar = kvM[2].slice(1);
          collection = evalExprCtx(kvM[3].trim(), ctx);
        } else {
          const vM = rExpr.match(/^(\$[A-Za-z_][A-Za-z0-9_]*)\s*:=\s*(.+)$/);
          if (vM) { valVar = vM[1].slice(1); collection = evalExprCtx(vM[2].trim(), ctx); }
          else      collection = evalExprCtx(rExpr, ctx);
        }

        if (collection === UNDEF || collection === null || collection === undefined) {
          piece = node.elseNodes ? execNodes(node.elseNodes, ctx) : ''; break;
        }

        let iterations = [];
        if (Array.isArray(collection)) {
          iterations = collection.map((v, k) => ({ key: k, val: v }));
        } else if (typeof collection === 'object') {
          iterations = Object.entries(collection).map(([k, v]) => ({ key: k, val: v }));
        } else {
          const n = toNum(collection);
          iterations = Array.from({ length: n }, (_, i) => ({ key: i, val: i }));
        }

        if (!iterations.length) { piece = node.elseNodes ? execNodes(node.elseNodes, ctx) : ''; break; }

        let rangeOut = '';
        for (const { key, val } of iterations) {
          const cv = { ...ctx.vars };
          if (keyVar) cv[keyVar] = key;
          if (valVar) cv[valVar] = val;
          rangeOut += execNodes(node.bodyNodes, { vals: ctx.vals, dot: val, vars: cv });
        }
        piece = rangeOut;
        break;
      }
      case 'with': {
        const wv = evalExprCtx(node.expr, ctx);
        if (isTruthy(wv)) {
          piece = execNodes(node.bodyNodes, { vals: ctx.vals, dot: wv === UNDEF ? ctx.dot : wv, vars: { ...ctx.vars } });
        } else {
          piece = node.elseNodes ? execNodes(node.elseNodes, ctx) : '';
        }
        break;
      }
      case 'define': piece = ''; break;
      default: piece = '';
    }

    // Whitespace trimming
    if (node.trimLeft)  out   = out.trimEnd();
    if (node.trimRight) piece = piece.replace(/^[ \t]*\n?/, '');
    if (node.type !== 'text' && node.trimRight && next && next.type === 'text') {
      next.value = next.value.replace(/^[ \t]*\n?/, '');
    }

    out += piece;
  }
  return out;
}

function renderHelm(template, vals) {
  const tokens    = tokeniseTemplate(template);
  const { nodes } = parseNodes(tokens, 0);
  return execNodes(nodes, { vals, dot: vals, vars: {} });
}

/* ══════════════════════════════════════════════════════════════════════════
   VERIFY
   ══════════════════════════════════════════════════════════════════════════ */
function extractValuePaths(inner) {
  const paths = [];
  const re = /\.Values\.([A-Za-z0-9_.]+)/g;
  let m;
  while ((m = re.exec(inner)) !== null) paths.push(m[1]);
  return paths;
}

function verifyInputs() {
  clearMessages();
  const template = templateEditor.value;
  const values   = valuesEditor.value;

  if (!template.trim()) errors.push('Template is empty.');
  if (!values.trim())   errors.push('Values.yaml is empty.');

  const openCount  = (template.match(/\{\{/g)  || []).length;
  const closeCount = (template.match(/\}\}/g)  || []).length;
  if (openCount !== closeCount)
    errors.push(`Unbalanced template delimiters: ${openCount} opening {{ vs ${closeCount} closing }}.`);

  const blockOpeners = (template.match(/\{\{-?\s*(?!else\s)(if|range|with|define)\b/g) || []).length;
  const blockEnds    = (template.match(/\{\{-?\s*end\s*-?\}\}/g)             || []).length;
  if (blockOpeners !== blockEnds)
    errors.push(`Block mismatch: ${blockOpeners} opening block(s) (if/range/with/define) but ${blockEnds} {{ end }} found.`);

  if (/\{\{-?\s*tpl\b/i.test(template))
    warnings.push('{{ tpl … }} is not fully evaluated — dynamic template rendering is not supported.');
  if (/\{\{-?\s*(include|template)\s/i.test(template))
    warnings.push('{{ include/template … }} — named template calls are stubbed and will output [include] or [template].');

  let valuesObj = null;
  try { if (values.trim()) valuesObj = parseYAML(values); }
  catch (e) { errors.push('Values.yaml parse error: ' + e.message); }

  if (valuesObj) {
    const expRe = /\{\{-?\s*([\s\S]*?)\s*-?\}\}/g;
    let m;
    const warned = new Set();
    while ((m = expRe.exec(template)) !== null) {
      const inner = m[1].trim();
      if (/^(end|else|define|range|with|if)\b/.test(inner)) continue;
      if (/^\/\*/.test(inner)) continue;
      if (/^\.(Files|Capabilities|Template|Release|Chart)\b/.test(inner)) continue;
      if (/^\$[A-Za-z_].*:=/.test(inner)) continue;
      extractValuePaths(inner).forEach(path => {
        if (!warned.has(path)) {
          const topKey = path.split('.')[0];
          if (resolvePath(valuesObj, topKey) === undefined) {
            warnings.push(`Missing value: .Values.${path}`);
            warned.add(path);
          }
        }
      });
    }
  }

  errors.forEach(m   => addMessage('error',   m));
  warnings.forEach(m => addMessage('warning', m));
  if (!errors.length && !warnings.length) addMessage('success', 'Verification completed successfully.');
  setStatus();
  return errors.length === 0;
}

/* ══════════════════════════════════════════════════════════════════════════
   OUTPUT HIGHLIGHTER
   ══════════════════════════════════════════════════════════════════════════ */
function highlightOutputYAML(yaml) {
  return yaml.split('\n').map(line => {
    const esc = escapeHtml(line);
    if (/^\s*#/.test(line)) return `<span class="yaml-comment">${esc}</span>`;
    if (/^\s*-\s/.test(line) && !line.includes(':')) return `<span class="yaml-string">${esc}</span>`;
    // key: value (value preceded by space/tab)
    const m = line.match(/^(\s*-?\s*)([^:#\s{}][^:{]*?)\s*:([ \t].*)$/);
    if (m) {
      let v = escapeHtml(m[3]);
      v = v.replace(/\b(true|false|null)\b/g, '<span class="yaml-bool">$1</span>');
      v = v.replace(/(?<![{A-Za-z])(-?\d+(\.\d+)?)(?![}\w])/g, '<span class="yaml-number">$1</span>');
      return `${escapeHtml(m[1])}<span class="yaml-key">${escapeHtml(m[2])}</span><span class="yaml-colon">:</span><span class="yaml-string">${v}</span>`;
    }
    // key: (parent mapping key with no inline value)
    const mk = line.match(/^(\s*-?\s*)([^:#\s{}][^:{]*?)\s*:\s*$/);
    if (mk) return `${escapeHtml(mk[1])}<span class="yaml-key">${escapeHtml(mk[2])}</span><span class="yaml-colon">:</span>`;
    return esc;
  }).join('\n');
}


function updateOutputLines() {
  const text = output.innerText;
  const count = text.trim() === '' ? 0 : text.split('\n').length;
  outputLines.innerHTML = count ? Array.from({ length: count }, (_, i) => i + 1).join('<br>') : '—';
  outputLines.scrollTop = output.scrollTop;
}
output.addEventListener('scroll', () => { outputLines.scrollTop = output.scrollTop; });
/* ══════════════════════════════════════════════════════════════════════════
   RENDER ENTRY POINT
   ══════════════════════════════════════════════════════════════════════════ */
function renderTemplate() {
  const ok = verifyInputs();
  if (!ok) { output.innerHTML = ''; updateOutputLines(); return; }

  const template = templateEditor.value;
  let vals = {};
  try { vals = parseYAML(valuesEditor.value); } catch { return; }

  let rendered;
  try {
    rendered = renderHelm(template, vals);
  } catch (e) {
    const msg = 'Render error: ' + e.message;
    errors.push(msg);
    addMessage('error', msg);
    setStatus();
    output.innerHTML = ''; updateOutputLines();
    return;
  }

  output.innerHTML = highlightOutputYAML(rendered);
  updateOutputLines();
  setStatus();
}

/* ══════════════════════════════════════════════════════════════════════════
   BUTTON WIRING
   ══════════════════════════════════════════════════════════════════════════ */
document.getElementById('renderBtn').addEventListener('click', renderTemplate);
document.getElementById('verifyBtn').addEventListener('click', verifyInputs);

document.getElementById('clearBtn').addEventListener('click', () => {
  templateEditor.value = '';
  valuesEditor.value   = '';
  output.innerHTML     = '';
  updateOutputLines();
  clearMessages();
  updateLines(templateEditor, document.getElementById('templateLines'));
  updateLines(valuesEditor,   document.getElementById('valuesLines'));
  updateBackdrop(templateEditor, templateBackdrop);
  updateBackdrop(valuesEditor,   valuesBackdrop);
  statusBadge.className   = 'status valid';
  statusBadge.textContent = 'READY';
});

document.getElementById('copyBtn').addEventListener('click', async () => {
  const text = output.innerText;
  if (!text.trim()) { toast('Nothing to copy'); return; }
  try { await navigator.clipboard.writeText(text); toast('Output copied'); }
  catch { toast('Copy failed'); }
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  const text = output.innerText;
  if (!text.trim()) { toast('Nothing to download'); return; }
  const blob = new Blob([text], { type: 'text/yaml' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'rendered-output.yaml';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  toast('Download started');
});
</script>
